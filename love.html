<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Mwe Sein - Fast & Vivid Birthday</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; -webkit-user-select: none; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        #book-container {
            position: absolute; top: 50%; left: 70%; transform: translate(-50%, -50%);
            width: 400px; height: 520px; perspective: 2500px;
            display: none; opacity: 0; z-index: 200;
            /* 加快书本显现速度：从 2s 改为 0.8s */
            transition: opacity 0.8s ease-in-out;
        }

        .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        .spiral {
            position: absolute; left: -15px; top: 20px; width: 30px; height: calc(100% - 40px);
            display: flex; flex-direction: column; justify-content: space-around;
            z-index: 10; pointer-events: none; transform-style: preserve-3d;
        }
        .ring {
            width: 35px; height: 10px; background: linear-gradient(to bottom, #444, #888, #444);
            border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .page {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: left; transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: grab;
        }
        .page:active { cursor: grabbing; }
        .side {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 5px 15px 15px 5px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        .cover {
            background-color: #b3956e;
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 5%, rgba(0,0,0,0) 95%, rgba(0,0,0,0.1) 100%),
                radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 100% 100%, 4px 4px;
            border-left: 20px solid rgba(0,0,0,0.15);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }
        
        .cover-title { text-align: center; color: #3a2b1a; pointer-events: none; }
        .cover-title h1 { font-size: 42px; margin: 0; font-family: "Georgia", serif; }

        .page-inner { 
            background-color: #fffef0; 
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.02) 5%, transparent 15%),
                url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3dXWtpaW1tbW9vb3Nzc3V1dXb29vjy8vT09Pd3d3f39/m5ubp6enr6+vt7e3u7u7x8fHy8vLz8/P09PT19fX29vb39/f5+fn6+vn7+/sJaN43AAAAtklEQVQ4y2P4z8AEAtY8NmwAmBwGAwS+GjYAxH6+bXWwYw93Xv4M8f9g488Xf9j688Uftf588UetP5/pYPsH5vO5pL5HOfW58fFvI9E9KqlP5mR97uO68fEfsP58pIPtH6S+uST5fG4u9bn48bE56R8b65v+6bO+9U859HFsOveY8fFvqBfP5yE7/M9I/wY05PAnK/0b0pDAn9SmeS87SOf8D5YpADi7X6QvX8X68vWp/5H1eX5Cfv8K9YVwAAwAZlGfS9U7r/oAAAAASUVORK5CYII=');
            background-repeat: repeat;
        }

        .page-inner img { 
            width: 85%; height: 85%; object-fit: cover; 
            border: 10px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.15); 
            pointer-events: none; 
            -webkit-user-drag: none;
        }
        
        .back { transform: rotateY(180deg); }
        .book.flipped-active .ring { transform: rotateY(-155deg); }

        #click-hint {
            position: absolute; bottom: -130px; width: 100vw; left: 50%; transform: translateX(-50%);
            text-align: center; color: #fff; font-size: 30px; font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            animation: breathe 2s infinite; pointer-events: none;
        }

        @keyframes breathe { 
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(0.9); } 
            50% { opacity: 1; transform: translateX(-50%) scale(1); } 
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="book-container">
    <div class="spiral">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>

    <div class="book" id="main-book">
        <div class="page" id="p1" style="z-index: 3;">
            <div class="side cover">
                <div class="cover-title">
                    <h1>Mwe Sein</h1>
                    <p style="letter-spacing: 5px; font-size: 14px; margin-top: 10px;">NOTEBOOK</p>
                </div>
            </div>
            <div class="side back page-inner"><img src="mwe1.jpg" alt="Photo 1"></div>
        </div>

        <div class="page" id="p2" style="z-index: 2;">
            <div class="side page-inner"><img src="mwe2.jpg" alt="Photo 2"></div>
            <div class="side back page-inner"><img src="mwe3.jpg" alt="Photo 3"></div>
        </div>

        <div class="page" id="p3" style="z-index: 1;">
            <div class="side page-inner"><img src="mwe4.jpg" alt="Photo 4"></div>
            <div class="side back cover" style="border: none;">
                <div style="text-align:center; color: #3a2b1a; padding: 20px;">
                    <h2 style="font-size: 28px;">Happy Birthday</h2>
                    <p>Wishing you a<br>wonderful day!</p>
                </div>
            </div>
        </div>
    </div>
    <div id="click-hint">✦ ✨ 点击或拉动翻开 ✨ ✦</div>
</div>

<script>
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, hideParticles = false;
let currentTextColor = "#42c8f5"; // 默认蓝色

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}

function getPoints(text, isLarge = false) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    
    // 增加 Happy Birthday 的字号使其更明显
    let fontSize = isLarge ? Math.min(fwW/7, 120) : Math.min(fwW/5, 180);
    tempCtx.font = `bold ${fontSize}px sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillText(text, fwW/2, fwH/2);
    
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    // 减小采样间隔（从7改为5），让字体更密集更明显
    const step = isLarge ? 5 : 7;
    for (let y = 0; y < fwH; y += step) {
        for (let x = 0; x < fwW; x += step) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        currentTextColor = "#42c8f5"; 
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 800); // 加快倒计时切换 (1000ms -> 800ms)
    } else {
        // 让 Happy Birthday to You 变成醒目的金黄色
        currentTextColor = "#ffeb3b"; 
        updateTargets(getPoints("Happy Birthday to You", true));
        
        const fwLaunch = setInterval(launchFirework, 100); // 加快烟花频率
        
        setTimeout(() => {
            clearInterval(fwLaunch);
            currentTextColor = "#42c8f5"; 
            updateTargets(getPoints("Mwe Sein"));
            
            setTimeout(() => {
                // 粒子向上飞出的速度加倍
                particles.forEach(p => p.ty = -fwH);
                
                setTimeout(() => { 
                    hideParticles = true; 
                    const container = document.getElementById('book-container');
                    container.style.display = 'block'; 
                    // 几乎立刻显现书本
                    setTimeout(() => container.style.opacity = '1', 50); 
                    initBookEvents(); 
                }, 600); // 缩短等待时间 (1200ms -> 600ms)
            }, 1800); // 名字停留时间缩短 (2500ms -> 1800ms)
        }, 2500); // 生日快乐停留时间 (3000ms -> 2500ms)
    }
}

function initBookEvents() {
    const pages = document.querySelectorAll('.page');
    let isDragging = false, startX = 0, currentTargetPage = null;

    pages.forEach(page => {
        const originalZ = page.id === 'p1' ? 3 : (page.id === 'p2' ? 2 : 1);
        page.querySelectorAll('img').forEach(img => { img.ondragstart = () => false; });

        const startHandler = (e) => {
            isDragging = true; currentTargetPage = page;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            page.style.transition = 'none';
        };

        const moveHandler = (e) => {
            if (!isDragging || currentTargetPage !== page) return;
            const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const diff = currentX - startX;
            if (!page.classList.contains('flipped')) {
                if (diff < 0) page.style.transform = `rotateY(${Math.max(-155, diff * 0.8)}deg)`;
            } else {
                if (diff > 0) page.style.transform = `rotateY(${Math.min(0, -155 + diff * 0.8)}deg)`;
            }
        };

        const endHandler = (e) => {
            if (!isDragging || currentTargetPage !== page) return;
            isDragging = false;
            const endX = e.type.includes('touch') ? (e.changedTouches ? e.changedTouches[0].clientX : startX) : e.clientX;
            const diff = endX - startX;
            page.style.transition = 'transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1)';
            if (Math.abs(diff) > 50 || Math.abs(diff) < 5) {
                if ((diff < -50 || Math.abs(diff) < 5) && !page.classList.contains('flipped')) {
                    flipPage(page, originalZ, true);
                } else if ((diff > 50 || Math.abs(diff) < 5) && page.classList.contains('flipped')) {
                    flipPage(page, originalZ, false);
                } else { resetPage(page); }
            } else { resetPage(page); }
            currentTargetPage = null;
        };

        page.addEventListener('mousedown', startHandler);
        page.addEventListener('touchstart', startHandler, {passive: true});
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('touchmove', moveHandler, {passive: false});
        window.addEventListener('mouseup', endHandler);
        window.addEventListener('touchend', endHandler);
    });
}

function resetPage(el) { el.style.transform = el.classList.contains('flipped') ? 'rotateY(-155deg)' : 'rotateY(0deg)'; }

function flipPage(el, originalZ, shouldFlip) {
    const book = document.getElementById('main-book');
    const hint = document.getElementById('click-hint');
    if(hint) hint.style.display = 'none';
    if (shouldFlip) {
        el.classList.add('flipped');
        el.style.transform = 'rotateY(-155deg)';
        if(el.id === 'p1') book.classList.add('flipped-active');
        setTimeout(() => { if(el.classList.contains('flipped')) el.style.zIndex = "0"; }, 400);
    } else {
        el.style.zIndex = originalZ;
        if(el.id === 'p1') book.classList.remove('flipped-active');
        el.classList.remove('flipped');
        el.style.transform = 'rotateY(0deg)';
    }
}

function initParticles() {
    for (let i = 0; i < 2500; i++) { // 增加粒子数量让文字更厚实
        particles.push({ x: Math.random()*fwW, y: Math.random()*fwH, tx: fwW/2, ty: fwH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, fwW, fwH);
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.1; // 稍微加快粒子聚拢速度
            p.y += (p.ty - p.y) * 0.1;
            pCtx.fillStyle = currentTextColor; 
            pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
        });
    }
    requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
