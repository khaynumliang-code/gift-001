<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Mwe Sein - Interactive Slider</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        /* 容器改为横向滑动布局 */
        #book-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 70vh;
            display: none; opacity: 0; z-index: 200;
            transition: opacity 0.8s ease-in-out;
            overflow: visible;
        }

        .slider-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: grab;
            will-change: transform;
        }
        .slider-wrapper:active { cursor: grabbing; }

        .slide-card {
            flex: 0 0 85vw; /* 每张卡片占屏幕宽度的 85% */
            margin: 0 7.5vw; /* 居中对齐 */
            height: 100%;
            background: #fffef0;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .slide-card img { 
            width: 90%; height: 90%; object-fit: contain; 
            border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            pointer-events: none;
        }

        /* 封面样式特别处理 */
        .cover-card { background-color: #b3956e; color: #3a2b1a; flex-direction: column; }
        .cover-title h1 { font-size: 48px; margin: 0; font-family: "Georgia", serif; }
        
        /* 结尾卡片样式 */
        .end-card { background-color: #b3956e; color: #3a2b1a; text-align: center; }

        #click-hint {
            position: absolute; bottom: 50px; width: 100%; text-align: center;
            color: #fff; font-size: 24px; font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            animation: breathe 2s infinite; pointer-events: none;
        }

        @keyframes breathe { 
            0%, 100% { opacity: 0.4; transform: scale(0.9); } 
            50% { opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="book-container">
    <div class="slider-wrapper" id="slider">
        <div class="slide-card cover-card">
            <div class="cover-title">
                <h1>Mwe Sein</h1>
                <p style="letter-spacing: 5px; font-size: 14px; margin-top: 10px; text-align:center;">NOTEBOOK</p>
            </div>
        </div>
        <div class="slide-card"><img src="mwe1.jpg" alt="Photo 1"></div>
        <div class="slide-card"><img src="mwe2.jpg" alt="Photo 2"></div>
        <div class="slide-card"><img src="mwe3.jpg" alt="Photo 3"></div>
        <div class="slide-card"><img src="mwe4.jpg" alt="Photo 4"></div>
        <div class="slide-card"><img src="mwe5.jpg" alt="Photo 5"></div>
        <div class="slide-card"><img src="mwe6.jpg" alt="Photo 6"></div>
        <div class="slide-card end-card">
            <h2 style="font-size: 36px;">Happy Birthday</h2>
            <p style="font-size: 18px;">Wishing you a<br>wonderful day!</p>
        </div>
    </div>
    <div id="click-hint">✦ 左右滑动查看 ✦</div>
</div>

<script>
// --- 原有特效逻辑 (保持不动) ---
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, hideParticles = false;
const BLUE_COLOR = "#42c8f5"; 

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    let fs = text.length > 15 ? Math.min(fwW/12, 50) : Math.min(fwW/5, 180);
    tempCtx.font = `bold ${fs}px sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillText(text, fwW/2, fwH/2);
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    for (let y = 0; y < fwH; y += 7) {
        for (let x = 0; x < fwW; x += 7) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 800);
    } else {
        updateTargets(getPoints("Happy Birthday to You"));
        const fwLaunch = setInterval(launchFirework, 120); 
        setTimeout(() => {
            clearInterval(fwLaunch);
            updateTargets(getPoints("Mwe Sein"));
            setTimeout(() => {
                particles.forEach(p => p.ty = -fwH);
                setTimeout(() => { 
                    hideParticles = true; 
                    const container = document.getElementById('book-container');
                    container.style.display = 'block'; 
                    setTimeout(() => container.style.opacity = '1', 50); 
                    initSliderEvents(); // 初始化滑动逻辑
                }, 600);
            }, 1800);
        }, 2500);
    }
}

// --- 新的左右滑动逻辑 (TikTok 风格) ---
function initSliderEvents() {
    const slider = document.getElementById('slider');
    const hint = document.getElementById('click-hint');
    let isDragging = false, startX = 0, currentTranslate = 0, prevTranslate = 0;
    let currentIndex = 0;

    const startHandler = (e) => {
        isDragging = true;
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        slider.style.transition = 'none';
        if(hint) hint.style.opacity = '0';
    };

    const moveHandler = (e) => {
        if (!isDragging) return;
        const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const diff = currentX - startX;
        currentTranslate = prevTranslate + diff;
        slider.style.transform = `translateX(${currentTranslate}px)`;
    };

    const endHandler = () => {
        if (!isDragging) return;
        isDragging = false;
        const movedBy = currentTranslate - prevTranslate;

        // 判断滑动距离是否足以切换到下一张
        if (movedBy < -100 && currentIndex < slider.children.length - 1) {
            currentIndex++;
        } else if (movedBy > 100 && currentIndex > 0) {
            currentIndex--;
        }

        prevTranslate = currentIndex * -window.innerWidth;
        currentTranslate = prevTranslate;
        
        slider.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
        slider.style.transform = `translateX(${prevTranslate}px)`;
    };

    slider.addEventListener('mousedown', startHandler);
    slider.addEventListener('touchstart', startHandler);
    window.addEventListener('mousemove', moveHandler);
    window.addEventListener('touchmove', moveHandler);
    window.addEventListener('mouseup', endHandler);
    window.addEventListener('touchend', endHandler);
}

function initParticles() {
    for (let i = 0; i < 2000; i++) {
        particles.push({ x: Math.random()*fwW, y: Math.random()*fwH, tx: fwW/2, ty: fwH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, fwW, fwH);
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.09; p.y += (p.ty - p.y) * 0.09;
            pCtx.fillStyle = BLUE_COLOR; pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
        });
    }
    requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
