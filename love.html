<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mwe Sein - Birthday Gallery</title>
    <style>
        /* 彻底锁定 body，防止 iOS 橡皮筋回弹 */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            position: fixed; /* 核心：防止页面整体滚动 */
            -webkit-user-select: none; user-select: none;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        #gallery-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; opacity: 0; z-index: 200;
            transition: opacity 0.8s ease-in-out;
            background: #000;
            touch-action: none; /* 显式禁用浏览器默认手势 */
        }

        .slider { 
            display: flex; width: 100%; height: 100%; 
            will-change: transform; 
            -webkit-backface-visibility: hidden; /* 开启硬件加速 */
        }
        
        .slide { 
            min-width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; 
        }
        
        .slide img { 
            max-width: 90%; max-height: 70%; object-fit: contain; 
            border-radius: 12px; pointer-events: none; 
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
        }

        .info-overlay {
            position: absolute; bottom: 18%; width: 100%; text-align: center; color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,1); pointer-events: none;
        }
        .info-overlay h3 { margin: 0; font-size: 32px; color: #42c8f5; }

        .dots { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        .dot { width: 7px; height: 7px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .dot.active { background: #42c8f5; transform: scale(1.4); }

        #hint {
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: rgba(255,255,255,0.6); font-size: 13px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="gallery-container">
    <div id="hint">✦ 左右滑动查看照片 ✦</div>
    <div class="slider" id="main-slider">
        <div class="slide"><img src="mwe1.jpg"><div class="info-overlay"><h3>Mwe Sein</h3></div></div>
        <div class="slide"><img src="mwe2.jpg"></div>
        <div class="slide"><img src="mwe3.jpg"></div>
        <div class="slide"><img src="mwe4.jpg"></div>
        <div class="slide"><img src="mwe5.jpg"></div>
        <div class="slide"><img src="mwe6.jpg"><div class="info-overlay"><h3>Happy Birthday!</h3></div></div>
    </div>
    <div class="dots" id="dot-container"></div>
</div>

<script>
// --- 原有动画逻辑 (烟花/粒子) ---
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, hideParticles = false;
const BLUE_COLOR = "#42c8f5"; 

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.02 + 0.01;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    let fontSize = (text.length === 1 && !isNaN(text)) ? Math.min(fwW * 0.8, 500) : Math.min(fwW / 6, 120); 
    tempCtx.font = `900 ${fontSize}px system-ui, sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillStyle = "white";
    const lines = text.split('\n');
    const lineHeight = fontSize * 1.1;
    const startY = (fwH - (lines.length * lineHeight)) / 2 + lineHeight / 2;
    lines.forEach((line, index) => { tempCtx.fillText(line, fwW / 2, startY + index * lineHeight); });
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    for (let y = 0; y < fwH; y += 4) {
        for (let x = 0; x < fwW; x += 4) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 1000);
    } else {
        updateTargets(getPoints("Happy\nBirthday"));
        const fwLaunch = setInterval(launchFirework, 150); 
        setTimeout(() => {
            updateTargets(getPoints("To\nYou"));
            setTimeout(() => {
                clearInterval(fwLaunch);
                updateTargets(getPoints("Mwe Sein"));
                setTimeout(() => {
                    particles.forEach(p => p.ty = -fwH);
                    setTimeout(() => { 
                        hideParticles = true; 
                        const container = document.getElementById('gallery-container');
                        container.style.display = 'block'; 
                        setTimeout(() => {
                            container.style.opacity = '1';
                            initGallery();
                        }, 50); 
                    }, 800);
                }, 2200);
            }, 2000);
        }, 2200);
    }
}

// --- 终极 iOS 兼容滑动逻辑 ---
function initGallery() {
    const slider = document.getElementById('main-slider');
    const slides = document.querySelectorAll('.slide');
    const dotContainer = document.getElementById('dot-container');
    let currentIndex = 0, isDragging = false, startX = 0, currentTranslate = 0, prevTranslate = 0;

    // 初始化点点
    dotContainer.innerHTML = '';
    slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = i === 0 ? 'dot active' : 'dot';
        dotContainer.appendChild(d);
    });

    function updateDots() {
        document.querySelectorAll('.dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    }

    // 使用统一的移动函数
    const moveSlider = (x) => {
        slider.style.transform = `translateX(${x}px)`;
    };

    // 触摸开始
    slider.addEventListener('touchstart', (e) => {
        isDragging = true;
        startX = e.changedTouches[0].clientX; // iOS 推荐用 changedTouches
        slider.style.transition = 'none';
        prevTranslate = currentIndex * -window.innerWidth;
    }, { passive: false });

    // 触摸移动
    slider.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault(); // 强力阻止 iOS 橡皮筋
        
        const currentX = e.changedTouches[0].clientX;
        currentTranslate = prevTranslate + (currentX - startX);
        moveSlider(currentTranslate);
    }, { passive: false });

    // 触摸结束
    slider.addEventListener('touchend', (e) => {
        if (!isDragging) return;
        isDragging = false;
        
        const endX = e.changedTouches[0].clientX;
        const diff = endX - startX;

        // 判定翻页（滑动超过 15% 屏幕宽度即翻页）
        const threshold = window.innerWidth * 0.15;
        
        if (diff < -threshold && currentIndex < slides.length - 1) {
            currentIndex++;
        } else if (diff > threshold && currentIndex > 0) {
            currentIndex--;
        }

        slider.style.transition = 'transform 0.4s ease-out';
        currentTranslate = currentIndex * -window.innerWidth;
        moveSlider(currentTranslate);
        updateDots();
    });

    // 监听窗口大小变化
    window.addEventListener('resize', () => {
        currentTranslate = currentIndex * -window.innerWidth;
        slider.style.transition = 'none';
        moveSlider(currentTranslate);
    });
}

function initParticles() {
    for (let i = 0; i < 3000; i++) {
        particles.push({ x: Math.random()*fwW, y: Math.random()*fwH, tx: fwW/2, ty: fwH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, fwW, fwH);
        pCtx.fillStyle = BLUE_COLOR;
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.08; p.y += (p.ty - p.y) * 0.08;
            pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
        });
    }
    requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
