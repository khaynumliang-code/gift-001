<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mwe Sein - Birthday Gallery</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            position: fixed;
            -webkit-user-select: none; user-select: none;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #fwCanvas { z-index: 50; }
        #particleCanvas { z-index: 100; }

        #gallery-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; opacity: 0; z-index: 500; /* 极高层级 */
            transition: opacity 0.8s ease-in-out;
            background: #000;
        }

        .slider { 
            display: flex; width: 100%; height: 100%; 
            will-change: transform;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .slide { 
            min-width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; 
            position: relative;
        }
        
        .slide img { 
            max-width: 85%; max-height: 70%; object-fit: contain; 
            border-radius: 12px; pointer-events: none; 
            -webkit-user-drag: none;
        }

        .info-overlay {
            position: absolute; bottom: 18%; width: 100%; text-align: center; color: white;
            pointer-events: none;
        }
        .info-overlay h3 { margin: 0; font-size: 32px; color: #42c8f5; text-shadow: 0 0 10px rgba(66,200,245,0.5); }

        .dots { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 12px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .dot.active { background: #42c8f5; transform: scale(1.4); }

        #hint {
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="gallery-container">
    <div id="hint">✦ 左右滑动查看 ✦</div>
    <div class="slider" id="main-slider">
        <div class="slide"><img src="mwe1.jpg"><div class="info-overlay"><h3>Mwe Sein</h3></div></div>
        <div class="slide"><img src="mwe2.jpg"></div>
        <div class="slide"><img src="mwe3.jpg"></div>
        <div class="slide"><img src="mwe4.jpg"></div>
        <div class="slide"><img src="mwe5.jpg"></div>
        <div class="slide"><img src="mwe6.jpg"><div class="info-overlay"><h3>Happy Birthday!</h3></div></div>
    </div>
    <div class="dots" id="dot-container"></div>
</div>

<script>
let fwCanvas = document.getElementById('fwCanvas');
let fwCtx = fwCanvas.getContext('2d');
let pCanvas = document.getElementById('particleCanvas');
let pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, isGalleryActive = false;
let aniId1, aniId2;

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.02 + 0.01;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    if(isGalleryActive) return;
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    if(isGalleryActive) return;
    aniId1 = requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    let fontSize = (text.length === 1 && !isNaN(text)) ? Math.min(fwW * 0.8, 450) : Math.min(fwW / 6, 110); 
    tempCtx.font = `900 ${fontSize}px system-ui, sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillStyle = "white";
    const lines = text.split('\n');
    const lineHeight = fontSize * 1.1;
    const startY = (fwH - (lines.length * lineHeight)) / 2 + lineHeight / 2;
    lines.forEach((line, index) => { tempCtx.fillText(line, fwW / 2, startY + index * lineHeight); });
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    for (let y = 0; y < fwH; y += 4) {
        for (let x = 0; x < fwW; x += 4) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 1000);
    } else {
        updateTargets(getPoints("Happy\nBirthday"));
        const fwLaunch = setInterval(launchFirework, 150); 
        setTimeout(() => {
            updateTargets(getPoints("To\nYou"));
            setTimeout(() => {
                clearInterval(fwLaunch);
                updateTargets(getPoints("Mwe Sein"));
                setTimeout(() => {
                    particles.forEach(p => p.ty = -fwH);
                    setTimeout(() => { 
                        // --- 关键修改：进入画廊前彻底杀死 Canvas 释放内存 ---
                        isGalleryActive = true;
                        cancelAnimationFrame(aniId1);
                        cancelAnimationFrame(aniId2);
                        fwCanvas.remove();
                        pCanvas.remove();
                        
                        const container = document.getElementById('gallery-container');
                        container.style.display = 'block'; 
                        setTimeout(() => {
                            container.style.opacity = '1';
                            initGallery();
                        }, 50); 
                    }, 800);
                }, 2200);
            }, 2000);
        }, 2200);
    }
}

function initGallery() {
    const slider = document.getElementById('main-slider');
    const slides = document.querySelectorAll('.slide');
    const dotContainer = document.getElementById('dot-container');
    let currentIndex = 0, isDragging = false, startX = 0, currentX = 0;

    dotContainer.innerHTML = '';
    slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = i === 0 ? 'dot active' : 'dot';
        dotContainer.appendChild(d);
    });

    const updateSlider = (offset = 0) => {
        const base = currentIndex * -100;
        const move = (offset / window.innerWidth) * 100;
        slider.style.transform = `translateX(${base + move}%)`;
    };

    slider.addEventListener('touchstart', (e) => {
        isDragging = true;
        startX = e.changedTouches[0].clientX;
        slider.style.transition = 'none';
    }, { passive: false });

    slider.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();
        currentX = e.changedTouches[0].clientX;
        updateSlider(currentX - startX);
    }, { passive: false });

    slider.addEventListener('touchend', (e) => {
        if (!isDragging) return;
        isDragging = false;
        const endX = e.changedTouches[0].clientX;
        const diff = endX - startX;
        const threshold = 60;

        if (diff < -threshold && currentIndex < slides.length - 1) currentIndex++;
        else if (diff > threshold && currentIndex > 0) currentIndex--;

        slider.style.transition = 'transform 0.4s ease-out';
        updateSlider(0);
        
        document.querySelectorAll('.dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    });
}

function initParticles() {
    for (let i = 0; i < 2500; i++) { // 减少粒子数量，减负
        particles.push({ x: Math.random()*fwW, y: Math.random()*fwH, tx: fwW/2, ty: fwH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}

function animateParticles() {
    if(isGalleryActive) return;
    aniId2 = requestAnimationFrame(animateParticles);
    pCtx.clearRect(0, 0, fwW, fwH);
    pCtx.fillStyle = BLUE_COLOR;
    particles.forEach(p => {
        p.x += (p.tx - p.x) * 0.08; p.y += (p.ty - p.y) * 0.08;
        pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
    });
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
