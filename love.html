<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Mwe Sein - Special Gift</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Microsoft YaHei", sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        /* 书本容器 */
        #book-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            height: 480px;
            perspective: 2500px;
            display: none;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: 100;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 0 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 10px 0 30px rgba(0,0,0,0.2), 5px 5px 30px rgba(0,0,0,0.5);
        }

        .side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.2) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        /* 封面设计 */
        .cover {
            background: linear-gradient(145deg, #2c3e50, #000000);
            border: 3px solid #d4af37;
            color: #d4af37;
            box-sizing: border-box;
        }
        
        .cover-title {
            text-align: center;
            border: 2px double #d4af37;
            padding: 30px 20px;
            margin: 20px;
            background: rgba(0,0,0,0.3);
        }

        .page-inner { background-color: #fcfcfc; }
        .page-inner img { width: 100%; height: 100%; object-fit: cover; }
        
        .back { transform: rotateY(180deg); background-color: #eee; }
        .page.flipped { transform: rotateY(-175deg); }

        #click-hint {
            position: absolute; bottom: -70px; width: 100%;
            text-align: center; color: #fff; font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: breathe 2.5s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="book-container">
    <div class="book">
        <div class="page" id="p1" style="z-index: 3;" onclick="flip(this, 3)">
            <div class="side cover">
                <div class="cover-title">
                    <h1 style="margin:0; font-size: 32px;">Mwe Sein</h1>
                    <div style="height: 2px; background: #d4af37; margin: 15px 0;"></div>
                    <p style="font-size: 14px; letter-spacing: 2px;">EXCLUSIVE ALBUM</p>
                    <small>点击翻开惊喜</small>
                </div>
            </div>
            <div class="side back page-inner">
                <img src="mwe1.jpg" alt="Photo 1">
            </div>
        </div>

        <div class="page" id="p2" style="z-index: 2;" onclick="flip(this, 2)">
            <div class="side page-inner"><img src="mwe2.jpg" alt="Photo 2"></div>
            <div class="side back page-inner"><img src="mwe3.jpg" alt="Photo 3"></div>
        </div>

        <div class="page" id="p3" style="z-index: 1;" onclick="flip(this, 1)">
            <div class="side page-inner"><img src="mwe4.jpg" alt="Photo 4"></div>
            <div class="side back cover" style="background:#1a1a1a; border:none;">
                <div style="text-align:center">
                    <h2 style="color:#d4af37">Happy Birthday</h2>
                    <p style="color:#eee; font-size:12px">所有的美好都如约而至</p>
                </div>
            </div>
        </div>
    </div>
    <div id="click-hint">✦ စာအုပ်ကိုဖွင့်ပါ ✦</div>
</div>

<script>
// --- 1. 背景：二进制慢速代码雨 ---
const mCanvas = document.getElementById('matrixCanvas');
const mCtx = mCanvas.getContext('2d');
let mW, mH;
function resizeM() { mW = mCanvas.width = window.innerWidth; mH = mCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeM); resizeM();

const chars = "01";
const fontSize = 16;
const columns = mW / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

let lastTime = 0;
const fps = 20;

function drawMatrix(timestamp) {
    requestAnimationFrame(drawMatrix);
    const diff = timestamp - lastTime;
    if (diff < 1000 / fps) return;
    lastTime = timestamp;

    mCtx.fillStyle = "rgba(0, 0, 0, 0.08)";
    mCtx.fillRect(0, 0, mW, mH);
    mCtx.fillStyle = "#0F0"; 
    mCtx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        mCtx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > mH && Math.random() > 0.985) drops[i] = 0;
        drops[i]++;
    }
}

// --- 2. 文字粒子逻辑 ---
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let pW, pH, particles = [], countdownNum = 10;
let hideParticles = false;
let currentParticleColor = "#42c8f5"; // 10秒倒计时初始颜色

function resizeP() { pW = pCanvas.width = window.innerWidth; pH = pCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeP); resizeP();

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = pW; tempCanvas.height = pH;
    let fs = (text === "Mwe Sein") ? Math.min(pW/5, 150) : (text === "Happy Birthday" ? Math.min(pW/7, 120) : Math.min(pW/4, 200));
    tempCtx.font = `bold ${fs}px sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillText(text, pW/2, pH/2);
    const data = tempCtx.getImageData(0, 0, pW, pH).data;
    const pts = [];
    for (let y = 0; y < pH; y += 7) {
        for (let x = 0; x < pW; x += 7) {
            if (data[(y * pW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        p.tx = t.x; p.ty = t.y;
    });
}

function initParticles() {
    for (let i = 0; i < 2000; i++) {
        particles.push({ x: Math.random()*pW, y: Math.random()*pH, tx: pW/2, ty: pH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}

function runFlow() {
    if (countdownNum >= 1) {
        currentParticleColor = "#42c8f5"; 
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; setTimeout(runFlow, 1000);
    } else {
        currentParticleColor = "#e0eb13"; // Happy Birthday 颜色
        updateTargets(getPoints("Happy Birthday"));
        setTimeout(() => {
            currentParticleColor = "#eb13d1"; // Mwe Sein 颜色
            updateTargets(getPoints("Mwe Sein"));
            setTimeout(showBook, 3000);
        }, 3000);
    }
}

function showBook() {
    particles.forEach(p => { p.ty = -pH; });
    setTimeout(() => { hideParticles = true; }, 2000);
    const bc = document.getElementById('book-container');
    bc.style.display = 'block';
    setTimeout(() => { bc.style.opacity = '1'; }, 100);
}

function flip(el, z) {
    // 核心修改：点击任何一页书时隐藏提示文字
    const hint = document.getElementById('click-hint');
    if (hint) hint.style.display = 'none';

    if (!el.classList.contains('flipped')) {
        el.classList.add('flipped');
        setTimeout(() => { el.style.zIndex = "0"; }, 700);
    } else {
        el.style.zIndex = z;
        setTimeout(() => { el.classList.remove('flipped'); }, 1);
    }
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, pW, pH);
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.08; p.y += (p.ty - p.y) * 0.08;
            pCtx.fillStyle = currentParticleColor; 
            pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
        });
    } else {
        pCtx.clearRect(0, 0, pW, pH);
    }
    requestAnimationFrame(animateParticles);
}

initParticles(); 
requestAnimationFrame(drawMatrix);
animateParticles();
</script>
</body>
</html>
