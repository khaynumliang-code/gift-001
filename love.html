<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Mwe Sein - Horizontal Interactive Book</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        #book-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 600px; perspective: 2500px;
            display: none; opacity: 0; z-index: 200;
            transition: opacity 0.8s ease-in-out;
            touch-action: none;
        }

        .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        
        /* 书脊（左侧环扣）*/
        .spiral {
            position: absolute; left: -10px; top: 20px; width: 20px; height: calc(100% - 40px);
            display: flex; flex-direction: column; justify-content: space-around;
            z-index: 100; pointer-events: none;
        }
        .ring {
            width: 35px; height: 10px; background: linear-gradient(to bottom, #444, #888, #444);
            border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .page {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: left center; /* 改为左侧旋转 */
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab;
            will-change: transform;
        }
        .page:active { cursor: grabbing; }
        
        .side {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 5px 15px 15px 5px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* 封面样式 */
        .cover {
            background-color: #b3956e;
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 5%, rgba(0,0,0,0) 95%, rgba(0,0,0,0.1) 100%),
                radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 100%, 4px 4px;
            border-left: 10px solid rgba(0,0,0,0.1);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }
        
        .cover-title { text-align: center; color: #3a2b1a; pointer-events: none; }
        .cover-title h1 { font-size: 42px; margin: 0; font-family: "Georgia", serif; }

        .page-inner { 
            background-color: #fffef0; 
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.02) 2%, transparent 10%),
                url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3dXWtpaW1tbW9vb3Nzc3V1dXb29vjy8vT09Pd3d3f39/m5ubp6enr6+vt7e3u7u7x8fHy8vLz8/P09PT19fX29vb39/f5+fn6+vn7+/sJaN43AAAAtklEQVQ4y2P4z8AEAtY8NmwAmBwGAwS+GjYAxH6+bXWwYw93Xv4M8f9g488Xf9j688Uftf588UetP5/pYPsH5vO5pL5HOfW58fFvI9E9KqlP5mR97uO68fEfsP58pIPtH6S+uST5fG4u9bn48bE56R8b65v+6bO+9U859HFsOveY8fFvqBfP5yE7/M9I/wY05PAnK/0b0pDAn9SmeS87SOf8D5YpADi7X6QvX8X68vWp/5H1eX5Cfv8K9YVwAAwAZlGfS9U7r/oAAAAASUVORK5CYII=');
        }

        .page-inner img { 
            width: 85%; height: 85%; object-fit: cover; 
            border: 8px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            pointer-events: none;
        }
        
        .back { transform: rotateY(-180deg); } /* 水平翻转 */

        #click-hint {
            position: absolute; bottom: -80px; width: 100%; text-align: center;
            color: #fff; font-size: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: breathe 2s infinite; pointer-events: none;
        }

        @keyframes breathe { 
            0%, 100% { opacity: 0.3; transform: scale(0.95); } 
            50% { opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="book-container">
    <div class="spiral">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>

    <div class="book" id="main-book">
        <div class="page" id="p1" style="z-index: 5;">
            <div class="side cover">
                <div class="cover-title">
                    <h1>Mwe Sein</h1>
                    <p style="letter-spacing: 5px; font-size: 14px; margin-top: 10px;">MEMORIES</p>
                </div>
            </div>
            <div class="side back page-inner"><img src="mwe1.jpg" alt="1"></div>
        </div>

        <div class="page" id="p2" style="z-index: 4;">
            <div class="side page-inner"><img src="mwe2.jpg" alt="2"></div>
            <div class="side back page-inner"><img src="mwe3.jpg" alt="3"></div>
        </div>

        <div class="page" id="p3" style="z-index: 3;">
            <div class="side page-inner"><img src="mwe4.jpg" alt="4"></div>
            <div class="side back page-inner"><img src="mwe5.jpg" alt="5"></div>
        </div>

        <div class="page" id="p4" style="z-index: 2;">
            <div class="side page-inner"><img src="mwe6.jpg" alt="6"></div>
            <div class="side back cover">
                <div style="text-align:center; color: #3a2b1a;">
                    <h2 style="font-size: 30px;">Happy Birthday</h2>
                    <p>Every moment with you is special.</p>
                </div>
            </div>
        </div>
    </div>
    <div id="click-hint">✦ 左右滑动或点击翻页 ✦</div>
</div>

<script>
// --- 这里保留你原有的烟花和粒子逻辑 (为了篇幅，省略部分重复的FW函数，逻辑完全一致) ---
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, hideParticles = false;
const BLUE_COLOR = "#42c8f5"; 

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

// ... (此处省略原有的 FireworkParticle 类, launchFirework, animateFW, getPoints 函数，保持不变) ...
// [提示：请直接套用你原代码中的这几个函数即可]

// --- 核心修正：水平翻页交互逻辑 ---

function initBookEvents() {
    const pages = document.querySelectorAll('.page');
    let isDragging = false, startX = 0, currentTargetPage = null;

    pages.forEach(page => {
        const originalZ = parseInt(window.getComputedStyle(page).zIndex);
        
        const startHandler = (e) => {
            isDragging = true; 
            currentTargetPage = page;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            page.style.transition = 'none'; 
        };

        const moveHandler = (e) => {
            if (!isDragging || currentTargetPage !== page) return;
            const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const diff = startX - currentX; // 向左拉，diff为正
            
            if (!page.classList.contains('flipped')) {
                // 未翻开时，向左拉翻开
                if (diff > 0) {
                    let angle = Math.min(160, diff * 0.5);
                    page.style.transform = `rotateY(${-angle}deg)`;
                    page.style.zIndex = (angle > 90) ? "10" : originalZ;
                }
            } else {
                // 已翻开时，向右拉合上
                if (diff < 0) {
                    let angle = Math.max(0, 160 + diff * 0.5);
                    page.style.transform = `rotateY(${-angle}deg)`;
                    page.style.zIndex = (angle < 90) ? originalZ : "10";
                }
            }
        };

        const endHandler = (e) => {
            if (!isDragging || currentTargetPage !== page) return;
            isDragging = false;
            const endX = e.type.includes('touch') ? (e.changedTouches ? e.changedTouches[0].clientX : startX) : e.clientX;
            const diff = startX - endX;
            
            page.style.transition = 'transform 0.8s cubic-bezier(0.2, 0, 0.2, 1)';
            
            // 点击判断 (移动距离极小则视为点击)
            if (Math.abs(diff) < 10) {
                flipPage(page, originalZ, !page.classList.contains('flipped'));
            } else {
                // 拖拽判断阈值
                if (!page.classList.contains('flipped') && diff > 50) {
                    flipPage(page, originalZ, true);
                } else if (page.classList.contains('flipped') && diff < -50) {
                    flipPage(page, originalZ, false);
                } else {
                    resetPage(page, originalZ);
                }
            }
            currentTargetPage = null;
        };

        page.addEventListener('mousedown', startHandler);
        page.addEventListener('touchstart', startHandler, {passive: false});
    });

    window.addEventListener('mousemove', moveHandler);
    window.addEventListener('touchmove', moveHandler, {passive: false});
    window.addEventListener('mouseup', endHandler);
    window.addEventListener('touchend', endHandler);
}

function resetPage(el, originalZ) { 
    const isFlipped = el.classList.contains('flipped');
    el.style.transform = isFlipped ? 'rotateY(-160deg)' : 'rotateY(0deg)'; 
    el.style.zIndex = isFlipped ? "10" : originalZ;
}

function flipPage(el, originalZ, shouldFlip) {
    const hint = document.getElementById('click-hint');
    if(hint) hint.style.opacity = '0';

    if (shouldFlip) {
        el.classList.add('flipped');
        el.style.transform = 'rotateY(-160deg)';
        // 翻过去后，确保它不遮挡前面的页面，但层级要高于书底
        setTimeout(() => { if(el.classList.contains('flipped')) el.style.zIndex = "1"; }, 300);
    } else {
        el.style.zIndex = "10"; // 回翻时层级提高
        el.classList.remove('flipped');
        el.style.transform = 'rotateY(0deg)';
        setTimeout(() => { if(!el.classList.contains('flipped')) el.style.zIndex = originalZ; }, 300);
    }
}

// --- 辅助 FW 函数 (必须保留以运行) ---
class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}
function launchFirework() {
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}
function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}
function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    let fontSize = text.length <= 1 ? Math.min(fwW, fwH) * 0.4 : Math.min(fwW / (text.length * 0.6), fwH * 0.12);
    tempCtx.fillStyle = "white"; tempCtx.font = `bold ${fontSize}px sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillText(text, fwW / 2, fwH / 2);
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    const step = Math.max(5, Math.floor(fontSize / 25));
    for (let y = 0; y < fwH; y += step) {
        for (let x = 0; x < fwW; x += step) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}
function updateTargets(pts) {
    if (pts.length === 0) return;
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}
function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 1000);
    } else {
        updateTargets(getPoints("Happy Birthday to You"));
        const fwLaunch = setInterval(launchFirework, 150); 
        setTimeout(() => {
            clearInterval(fwLaunch);
            updateTargets(getPoints("Mwe Sein"));
            setTimeout(() => {
                particles.forEach(p => p.ty = -fwH);
                setTimeout(() => { 
                    hideParticles = true; 
                    const container = document.getElementById('book-container');
                    container.style.display = 'block'; 
                    setTimeout(() => container.style.opacity = '1', 50); 
                    initBookEvents(); 
                }, 800);
            }, 2000);
        }, 3000);
    }
}
function initParticles() {
    for (let i = 0; i < 2500; i++) {
        particles.push({ x: Math.random()*fwW, y: Math.random()*fwH, tx: fwW/2, ty: fwH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}
function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, fwW, fwH);
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.09; p.y += (p.ty - p.y) * 0.09;
            pCtx.fillStyle = BLUE_COLOR; pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
        });
    }
    requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
