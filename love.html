<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Mwe Sein - Ultra Smooth Version</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        #book-container {
            position: absolute;
            top: 50%;
            left: 70%; /* 锁定手机端靠右位置 */
            transform: translate(-50%, -50%);
            width: 400px;
            height: 520px;
            perspective: 2500px;
            
            /* 关键改进：不使用 display:none，改用 visibility 和 opacity */
            visibility: hidden; 
            opacity: 0;    
            z-index: 200;
            
            /* 增加平稳过渡效果 */
            transition: opacity 2s ease-in-out, visibility 2s;
            will-change: opacity;
        }

        /* 当增加 .active 类时，书本顺滑出现 */
        #book-container.active {
            visibility: visible;
            opacity: 1;
        }

        .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        .spiral {
            position: absolute; left: -15px; top: 20px; width: 30px; height: calc(100% - 40px);
            display: flex; flex-direction: column; justify-content: space-around;
            z-index: 10; pointer-events: none; transform-style: preserve-3d;
        }
        .ring {
            width: 35px; height: 10px; background: linear-gradient(to bottom, #444, #888, #444);
            border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: transform 1.6s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .page {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: left; transform-style: preserve-3d;
            transition: transform 1.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }
        .side {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 5px 15px 15px 5px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .cover {
            background-color: #a68a64;
            background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 3px 3px; border-left: 20px solid rgba(0,0,0,0.1);
        }
        .cover-title { text-align: center; padding: 20px; color: #4a3721; }
        .cover-title h1 { font-size: 42px; margin: 0; font-family: "Georgia", serif; opacity: 0.8; }
        .page-inner { background: #fff; box-shadow: inset 20px 0 50px rgba(0,0,0,0.05); }
        .page-inner img { width: 85%; height: 85%; object-fit: cover; border: 10px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .back { transform: rotateY(180deg); background-color: #f5f5f5; }
        .page.flipped { transform: rotateY(-155deg); }
        .book.flipped-active .ring { transform: rotateY(-155deg); }

        #click-hint {
            position: absolute; bottom: -130px; width: 100vw; left: 50%; transform: translateX(-50%);
            text-align: center; color: #fff; font-size: 38px; font-weight: 900;
            letter-spacing: 5px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            animation: breathe-ultra 2s infinite; white-space: nowrap; pointer-events: none;
        }

        @keyframes breathe-ultra { 
            0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.85); } 
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); } 
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="book-container">
    <div class="spiral" id="spiral-rings">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>

    <div class="book" id="main-book">
        <div class="page" id="p1" style="z-index: 3;" onclick="flip(this, 3)">
            <div class="side cover">
                <div class="cover-title">
                    <h1>Mwe Sein</h1>
                    <p style="letter-spacing: 5px; font-size: 14px; margin-top: 10px;">NOTEBOOK</p>
                </div>
            </div>
            <div class="side back page-inner">
                <img src="mwe1.jpg" alt="Photo 1">
            </div>
        </div>

        <div class="page" id="p2" style="z-index: 2;" onclick="flip(this, 2)">
            <div class="side page-inner"><img src="mwe2.jpg" alt="Photo 2"></div>
            <div class="side back page-inner"><img src="mwe3.jpg" alt="Photo 3"></div>
        </div>

        <div class="page" id="p3" style="z-index: 1;" onclick="flip(this, 1)">
            <div class="side page-inner"><img src="mwe4.jpg" alt="Photo 4"></div>
            <div class="side back cover" style="border: none;">
                <div style="text-align:center; color: #4a3721;">
                    <h2 style="font-size: 30px;">Happy Birthday to You</h2>
                    <p>Wishing you a wonderful day!</p>
                </div>
            </div>
        </div>
    </div>
    <div id="click-hint">✦ စာအုပ်ကိုဖွင့်ပါ ✦</div>
</div>

<script>
// --- Fireworks Logic ---
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
function resizeFW() { fwW = fwCanvas.width = window.innerWidth; fwH = fwCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeFW); resizeFW();

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    const x = Math.random() * fwW;
    const y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.clearRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => {
        p.update(); p.draw();
        if (p.alpha <= 0) fireworks.splice(i, 1);
    });
}

// --- Blue Particles Logic ---
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let pW, pH, particles = [], countdownNum = 3; 
let hideParticles = false;
const BLUE_COLOR = "#42c8f5"; 

function resizeP() { pW = pCanvas.width = window.innerWidth; pH = pCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeP); resizeP();

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = pW; tempCanvas.height = pH;
    let fs = text.length > 15 ? Math.min(pW/10, 60) : Math.min(pW/4, 200);
    tempCtx.font = `bold ${fs}px sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillText(text, pW/2, pH/2);
    const data = tempCtx.getImageData(0, 0, pW, pH).data;
    const pts = [];
    for (let y = 0; y < pH; y += 7) {
        for (let x = 0; x < pW; x += 7) {
            if (data[(y * pW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--;
        setTimeout(runFlow, 1000);
    } else {
        updateTargets(getPoints("Happy Birthday to You"));
        const fwLaunch = setInterval(launchFirework, 150);
        setTimeout(() => {
            clearInterval(fwLaunch);
            updateTargets(getPoints("Mwe Sein"));
            setTimeout(showBook, 1500);
        }, 3000);
    }
}

// --- 极致平滑显示函数 ---
function showBook() {
    // 蓝色粒子飞散
    particles.forEach(p => { p.ty = -pH; });
    setTimeout(() => { hideParticles = true; }, 1500);

    const bc = document.getElementById('book-container');
    
    // 直接添加 active 类，书本会在 70% 的位置原地淡入
    // 因为它一直都在那里，只是之前透明度是 0
    bc.classList.add('active');
}

function flip(el, z) {
    const book = document.getElementById('main-book');
    const hint = document.getElementById('click-hint');
    if(hint) hint.style.display = 'none';
    
    if (!el.classList.contains('flipped')) {
        el.classList.add('flipped');
        if(el.id === 'p1') book.classList.add('flipped-active');
        setTimeout(() => { el.style.zIndex = "0"; }, 700);
    } else {
        el.style.zIndex = z;
        if(el.id === 'p1') book.classList.remove('flipped-active');
        setTimeout(() => { el.classList.remove('flipped'); }, 1);
    }
}

function initParticles() {
    for (let i = 0; i < 2000; i++) {
        particles.push({ x: Math.random()*pW, y: Math.random()*pH, tx: pW/2, ty: pH/2, size: Math.random()*2 + 1 });
    }
    runFlow();
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, pW, pH);
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.08; 
            p.y += (p.ty - p.y) * 0.08;
            pCtx.fillStyle = BLUE_COLOR; 
            pCtx.beginPath(); 
            pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); 
            pCtx.fill();
        });
    }
    requestAnimationFrame(animateParticles);
}

initParticles(); resizeFW(); resizeP();
animateFW(); animateParticles();
</script>
</body>
</html>
