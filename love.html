<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mwe Sein - Birthday Gallery</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: system-ui, -apple-system, sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        #gallery-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; opacity: 0; z-index: 200;
            transition: opacity 0.8s ease-in-out;
            background: #000;
        }

        .slider { 
            display: flex; width: 100%; height: 100%; will-change: transform; 
            touch-action: none; 
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .slide { 
            min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; 
        }

        /* 关键修复：给图片盖一个透明层，防止手指直接点到图片触发 iOS 系统菜单 */
        .slide::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
        }

        .slide img { 
            max-width: 90%; max-height: 75%; object-fit: contain; 
            border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            pointer-events: none; -webkit-user-drag: none;
        }

        .info-overlay {
            position: absolute; bottom: 15%; left: 10%; right: 10%; color: white;
            text-shadow: 0 2px 15px rgba(0,0,0,1);
            pointer-events: none; z-index: 220;
        }
        .info-overlay h3 { margin: 0; font-size: 32px; color: #42c8f5; font-weight: 900; }

        .dots { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 12px; z-index: 230; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #42c8f5; transform: scale(1.5); }

        #hint {
            position: absolute; top: 50px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.8); font-size: 14px; letter-spacing: 4px;
            z-index: 210;
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="gallery-container">
    <div id="hint">✦ 左右滑动查看照片 ✦</div>
    <div class="slider" id="main-slider">
        <div class="slide"><img src="mwe1.jpg"><div class="info-overlay"><h3>Mwe Sein</h3></div></div>
        <div class="slide"><img src="mwe2.jpg"></div>
        <div class="slide"><img src="mwe3.jpg"></div>
        <div class="slide"><img src="mwe4.jpg"></div>
        <div class="slide"><img src="mwe5.jpg"></div>
        <div class="slide"><img src="mwe6.jpg"><div class="info-overlay"><h3>Happy Birthday!</h3></div></div>
    </div>
    <div class="dots" id="dot-container"></div>
</div>

<script>
// --- 这里是你原有的烟花和粒子代码，完全没动 ---
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, hideParticles = false;
const BLUE_COLOR = "#42c8f5"; 

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    let fontSize = (text.length === 1 && !isNaN(text)) ? Math.min(fwW * 0.8, 500) : Math.min(fwW / 6, 120); 
    tempCtx.font = `900 ${fontSize}px system-ui, sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillStyle = "white";
    const lines = text.split('\n');
    const lineHeight = fontSize * 1.1;
    const totalHeight = lines.length * lineHeight;
    const startY = (fwH - totalHeight) / 2 + lineHeight / 2;
    lines.forEach((line, index) => { tempCtx.fillText(line, fwW / 2, startY + index * lineHeight); });
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    for (let y = 0; y < fwH; y += 4) {
        for (let x = 0; x < fwW; x += 4) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 1000);
    } else {
        updateTargets(getPoints("Happy\nBirthday"));
        const fwLaunch = setInterval(launchFirework, 150); 
        setTimeout(() => {
            updateTargets(getPoints("To\nYou"));
            setTimeout(() => {
                clearInterval(fwLaunch);
                updateTargets(getPoints("Mwe Sein"));
                setTimeout(() => {
                    particles.forEach(p => p.ty = -fwH);
                    setTimeout(() => { 
                        hideParticles = true; 
                        const container = document.getElementById('gallery-container');
                        container.style.display = 'block'; 
                        setTimeout(() => container.style.opacity = '1', 50); 
                        initGallery(); 
                    }, 800);
                }, 2200);
            }, 2000);
        }, 2200);
    }
}

// --- 核心修复后的滑动函数 ---
function initGallery() {
    const slider = document.getElementById('main-slider');
    const slides = document.querySelectorAll('.slide');
    const dotContainer = document.getElementById('dot-container');
    let currentIndex = 0, isDragging = false, startX = 0, currentMove = 0;

    dotContainer.innerHTML = '';
    slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = (i === 0) ? 'dot active' : 'dot';
        dotContainer.appendChild(d);
    });

    // 统一更新函数：使用百分比移动，iOS 最稳
    const updatePos = (movePx = 0) => {
        const percent = (currentIndex * -100) + (movePx / window.innerWidth * 100);
        slider.style.transform = `translateX(${percent}%)`;
    };

    slider.addEventListener('touchstart', (e) => {
        isDragging = true;
        startX = e.touches[0].clientX;
        slider.style.transition = 'none';
    }, { passive: false });

    slider.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault(); // 强力阻止苹果浏览器拦截
        currentMove = e.touches[0].clientX - startX;
        updatePos(currentMove);
    }, { passive: false });

    slider.addEventListener('touchend', (e) => {
        if (!isDragging) return;
        isDragging = false;
        
        slider.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
        
        // 判定翻页：滑动超过 50px 
        if (currentMove < -50 && currentIndex < slides.length - 1) currentIndex++;
        else if (currentMove > 50 && currentIndex > 0) currentIndex--;

        currentMove = 0;
        updatePos(0);
        
        // 更新点点
        document.querySelectorAll('.dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    });
}

function initParticles() {
    for (let i = 0; i < 3500; i++) {
        particles.push({ x: Math.random()*fwW, y: Math.random()*fwH, tx: fwW/2, ty: fwH/2, size: Math.random()*2.5 + 1 });
    }
    runFlow();
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, fwW, fwH);
        pCtx.fillStyle = BLUE_COLOR;
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.1; p.y += (p.ty - p.y) * 0.1;
            pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
        });
    }
    requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
