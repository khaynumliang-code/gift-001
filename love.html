<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mwe Sein - TikTok Style Gallery</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #fwCanvas { z-index: 50; pointer-events: none; }
        #particleCanvas { z-index: 100; pointer-events: none; }

        /* 滑动容器层 */
        #gallery-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; opacity: 0; z-index: 200;
            transition: opacity 0.8s ease-in-out;
            background: #000;
        }

        .slider {
            display: flex; width: 100%; height: 100%;
            will-change: transform;
            cursor: grab;
        }
        .slider:active { cursor: grabbing; }

        .slide {
            min-width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .slide img {
            max-width: 90%; max-height: 85%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            pointer-events: none; 
        }

        .info-overlay {
            position: absolute; bottom: 100px; left: 30px; color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .info-overlay h3 { margin: 0; font-size: 28px; color: #42c8f5; }

        .dots {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; gap: 10px;
        }
        .dot {
            width: 8px; height: 8px; background: rgba(255,255,255,0.3);
            border-radius: 50%; transition: 0.3s;
        }
        .dot.active { background: #42c8f5; transform: scale(1.4); }

        #hint {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 13px; letter-spacing: 3px;
            z-index: 210;
        }
    </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="gallery-container">
    <div id="hint">✦ 左右滑动查看照片 ✦</div>
    <div class="slider" id="main-slider">
        <div class="slide"><img src="mwe1.jpg" alt="1"><div class="info-overlay"><h3>Mwe Sein</h3></div></div>
        <div class="slide"><img src="mwe2.jpg" alt="2"></div>
        <div class="slide"><img src="mwe3.jpg" alt="3"></div>
        <div class="slide"><img src="mwe4.jpg" alt="4"></div>
        <div class="slide"><img src="mwe5.jpg" alt="5"></div>
        <div class="slide"><img src="mwe6.jpg" alt="6"><div class="info-overlay"><h3>Happy Birthday!</h3></div></div>
    </div>
    <div class="dots" id="dot-container"></div>
</div>

<script>
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let fwW, fwH, fireworks = [];
let particles = [], countdownNum = 3, hideParticles = false;
// 这里的颜色可以根据喜好调整，推荐明亮的浅蓝色或粉紫色
const BLUE_COLOR = "#42c8f5"; 

function resize() { 
    fwW = fwCanvas.width = pCanvas.width = window.innerWidth; 
    fwH = fwCanvas.height = pCanvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

class FireworkParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
    }
    draw() {
        fwCtx.save(); fwCtx.globalAlpha = this.alpha; fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2); fwCtx.fillStyle = this.color; fwCtx.fill(); fwCtx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.alpha -= this.decay; }
}

function launchFirework() {
    const x = Math.random() * fwW, y = Math.random() * (fwH * 0.6);
    const color = `hsl(${Math.random() * 360}, 100%, 75%)`;
    for (let i = 0; i < 40; i++) fireworks.push(new FireworkParticle(x, y, color));
}

function animateFW() {
    requestAnimationFrame(animateFW);
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    fwCtx.fillRect(0, 0, fwW, fwH);
    fireworks.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) fireworks.splice(i, 1); });
}

function getPoints(text) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = fwW; tempCanvas.height = fwH;
    // 增加字体大小判定，让字更饱满
    let fs = text.length > 15 ? Math.min(fwW/10, 60) : Math.min(fwW/6, 150);
    tempCtx.font = `bold ${fs}px "Segoe UI", sans-serif`;
    tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
    tempCtx.fillText(text, fwW/2, fwH/2);
    const data = tempCtx.getImageData(0, 0, fwW, fwH).data;
    const pts = [];
    // 减小采样步长 (从 7 降到 5)，增加粒子密度
    for (let y = 0; y < fwH; y += 5) {
        for (let x = 0; x < fwW; x += 5) {
            if (data[(y * fwW + x) * 4 + 3] > 128) pts.push({x, y});
        }
    }
    return pts;
}

function updateTargets(pts) {
    particles.forEach((p, i) => {
        const t = pts[i % pts.length];
        if(t) { p.tx = t.x; p.ty = t.y; }
    });
}

function runFlow() {
    if (countdownNum >= 1) {
        updateTargets(getPoints(countdownNum.toString()));
        countdownNum--; 
        setTimeout(runFlow, 1000); // 稍微延长倒计时感官
    } else {
        updateTargets(getPoints("Happy Birthday to You"));
        const fwLaunch = setInterval(launchFirework, 150); 
        setTimeout(() => {
            clearInterval(fwLaunch);
            updateTargets(getPoints("Mwe Sein"));
            setTimeout(() => {
                particles.forEach(p => p.ty = -fwH);
                setTimeout(() => { 
                    hideParticles = true; 
                    const container = document.getElementById('gallery-container');
                    container.style.display = 'block'; 
                    setTimeout(() => container.style.opacity = '1', 50); 
                    initGallery(); 
                }, 600);
            }, 2000);
        }, 3000);
    }
}

function initGallery() {
    const slider = document.getElementById('main-slider');
    const slides = document.querySelectorAll('.slide');
    const dotContainer = document.getElementById('dot-container');
    let currentIndex = 0;
    let isDragging = false;
    let startX = 0, currentTranslate = 0, prevTranslate = 0;

    dotContainer.innerHTML = '';
    slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = i === 0 ? 'dot active' : 'dot';
        dotContainer.appendChild(d);
    });

    function updateDots() {
        document.querySelectorAll('.dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    }

    function setSliderPosition() {
        slider.style.transform = `translateX(${currentTranslate}px)`;
    }

    function setPositionByIndex() {
        currentTranslate = currentIndex * -window.innerWidth;
        prevTranslate = currentTranslate;
        slider.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
        setSliderPosition();
        updateDots();
    }

    function onStart(e) {
        isDragging = true;
        startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        slider.style.transition = 'none';
        prevTranslate = currentIndex * -window.innerWidth;
    }

    function onMove(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();
        const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        const diff = currentX - startX;
        currentTranslate = prevTranslate + diff;
        setSliderPosition();
    }

    function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        const movedBy = currentTranslate - prevTranslate;
        if (movedBy < -window.innerWidth * 0.15 && currentIndex < slides.length - 1) currentIndex++;
        else if (movedBy > window.innerWidth * 0.15 && currentIndex > 0) currentIndex--;
        setPositionByIndex();
    }

    slider.addEventListener('touchstart', onStart, { passive: false });
    slider.addEventListener('touchmove', onMove, { passive: false });
    slider.addEventListener('touchend', onEnd);
    slider.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('resize', setPositionByIndex);
}

function initParticles() {
    // 增加粒子数量到 3500 让字迹更厚实
    for (let i = 0; i < 3500; i++) {
        particles.push({ 
            x: Math.random()*fwW, 
            y: Math.random()*fwH, 
            tx: fwW/2, 
            ty: fwH/2, 
            size: Math.random()*2 + 0.5,
            color: BLUE_COLOR 
        });
    }
    runFlow();
}

function animateParticles() {
    if (!hideParticles) {
        pCtx.clearRect(0, 0, fwW, fwH);
        // 关键：增加外发光效果
        pCtx.shadowBlur = 10;
        pCtx.shadowColor = BLUE_COLOR;

        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.08; 
            p.y += (p.ty - p.y) * 0.08;
            pCtx.fillStyle = p.color;
            pCtx.beginPath();
            pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            pCtx.fill();
        });
        
        // 重置阴影防止影响后续绘制
        pCtx.shadowBlur = 0;
    }
    requestAnimationFrame(animateParticles);
}

resize(); initParticles(); animateFW(); animateParticles();
</script>
</body>
</html>
